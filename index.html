<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brew & Bill – Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>"/>
  <link rel="stylesheet" href="css/style.css"/>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="login-page">

  <!-- ===== LOGIN WRAPPER ===== -->
  <div class="login-wrapper">

    <!-- Left Brand Panel -->
    <div class="login-brand">
      <div class="brand-logo">☕</div>
      <h1 class="brand-title">Brew &amp; Bill</h1>
      <p class="brand-subtitle">Coffee Shop POS</p>
      <p class="brand-tagline">"Serving smiles, one cup at a time"</p>
    </div>

    <!-- Right Form Panel -->
    <div class="login-form-panel">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your dashboard</p>

      <!-- Demo credentials hint -->
      <div class="login-hint">
        <i class="fa fa-circle-info"></i>
        Demo: <span>admin / admin123</span> &nbsp;|&nbsp; <span>cashier / cash123</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <i class="fa fa-user"></i>
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
          <p class="field-error text-danger" id="usernameError"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fa fa-lock"></i>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              id="togglePwd"
              aria-label="Toggle password visibility"
            >
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <p class="field-error text-danger" id="passwordError"></p>
        </div>

        <!-- Error message -->
        <div id="loginError" class="login-error">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          <i class="fa fa-arrow-right-to-bracket"></i>
          Sign In
        </button>

      </form>

    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth.js"></script>
  <script>
    // =============================================
    // Login Page Logic
    // =============================================

    // Toggle password visibility
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');

      // Clear previous errors
      errorDiv.style.display = 'none';
      document.getElementById('usernameError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';

      // Validate fields
      let valid = true;
      if (!username) {
        document.getElementById('usernameError').textContent = 'Username is required.';
        document.getElementById('usernameError').style.display = 'block';
        valid = false;
      }
      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required.';
        document.getElementById('passwordError').style.display = 'block';
        valid = false;
      }
      if (!valid) return;

      // Animate button
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in...';
      btn.disabled = true;

      setTimeout(() => {
        // Attempt login via auth.js
        const result = Auth.login(username, password);

        if (result.success) {
          showToast('Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
        } else {
          errorDiv.textContent = result.message || 'Invalid username or password.';
          errorDiv.style.display = 'block';
          btn.innerHTML = '<i class="fa fa-arrow-right-to-bracket"></i> Sign In';
          btn.disabled = false;
        }
      }, 600);
    });

    // Toast helper (standalone for login page)
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const iconMap = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fa ${iconMap[type] || iconMap.info} toast-icon"></i>
        <span class="toast-msg">${msg}</span>
        <button class="toast-close" onclick="this.parentElement.remove()"><i class="fa fa-xmark"></i></button>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
